name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  product-spine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Sync dependencies
        run: uv sync --extra cpu --dev

      - name: Format check
        run: uv run ruff format --check src tests tools examples

      - name: Lint
        run: uv run ruff check src tests tools examples

      - name: Import boundaries
        run: uv run python tools/check_public_imports.py

      - name: Tests
        run: uv run pytest -q tests --cov
