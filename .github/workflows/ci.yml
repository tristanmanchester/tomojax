name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --extra cpu --extra bench --group dev

      - name: Lint
        run: uv run ruff check src/tomojax tests

      - name: Test
        run: uv run pytest -q tests
