name: speed_recon_small
task: recon
fixture: recon_small_v1.npz
objective_name: warm_run_seconds_mean
objective_direction: minimise
warm_runs: 3
jax_cache_dir: null
env:
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
measurement:
  gpu_memory: true
  host_rss: true
  gpu_poll_interval_seconds: 0.05
  host_poll_interval_seconds: 0.05
recon:
  algorithm: fbp
  filter_name: ramp
  views_per_batch: 1
  projector_unroll: 1
  checkpoint_projector: true
  gather_dtype: bf16
data:
  nx: 64
  ny: 64
  nz: 64
  nu: 64
  nv: 64
  n_views: 128
  geometry: parallel
  phantom: random_shapes
  n_cubes: 12
  n_spheres: 10
  min_size: 3
  max_size: 12
  min_value: 0.05
  max_value: 0.8
  seed: 7
