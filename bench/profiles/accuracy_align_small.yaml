name: accuracy_align_small
task: align
fixture: align_small_v1.npz
objective_name: gt_mse
objective_direction: minimise
warm_runs: 1
jax_cache_dir: null
env:
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
measurement:
  gpu_memory: true
  host_rss: true
  gpu_poll_interval_seconds: 0.05
  host_poll_interval_seconds: 0.05
align:
  levels: [4, 2, 1]
  outer_iters: 4
  recon_iters: 10
  lambda_tv: 0.005
  tv_prox_iters: 10
  recon_rel_tol: null
  recon_patience: 2
  views_per_batch: 1
  projector_unroll: 1
  checkpoint_projector: true
  gather_dtype: auto
  opt_method: gn
  gn_damping: 0.001
  w_rot: 0.001
  w_trans: 0.001
  early_stop: true
  early_stop_rel_impr: 0.001
  early_stop_patience: 2
  loss_kind: l2_otsu
  k_step: 1
data:
  nx: 128
  ny: 128
  nz: 1
  nu: 128
  nv: 128
  n_views: 60
  geometry: parallel
  phantom: shepp
  seed: 0
  misalignment:
    rot_deg: 1.0
    trans_px: 5.0
    include_phi: true
    seed: 1
