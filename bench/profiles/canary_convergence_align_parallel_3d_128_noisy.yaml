name: canary_convergence_align_parallel_3d_128_noisy
task: align
objective_name: warm_gt_mse_median
objective_direction: minimise
warm_runs: 2
jax_cache_dir: null
env:
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
measurement:
  gpu_memory: true
  host_rss: true
  gpu_poll_interval_seconds: 0.05
  host_poll_interval_seconds: 0.05
visualization:
  enabled: true
convergence:
  enabled: true
  metric: gt_mse
  threshold: null
  stop_on_threshold: false
  stop_on_plateau: false
  min_finest_level_checks: 2
  plateau_patience: 2
  rel_improvement_tol: 0.02
  required_warm_successes: 2
align:
  warmup_enabled: true
  warmup_time_budget_seconds: 180
  warmup_stop_on_first_finest_level: true
  time_budget_seconds: 900
  levels: [4, 2, 1]
  outer_iters: 6
  recon_iters: 15
  lambda_tv: 0.003
  tv_prox_iters: 8
  recon_rel_tol: null
  recon_patience: 0
  views_per_batch: 1
  projector_unroll: 1
  checkpoint_projector: true
  gather_dtype: bf16
  opt_method: gn
  gn_damping: 0.001
  w_rot: 0.001
  w_trans: 0.001
  early_stop: false
  loss_kind: l2_otsu
  k_step: 1
data:
  nx: 128
  ny: 128
  nz: 96
  nu: 128
  nv: 96
  n_views: 180
  geometry: parallel
  phantom: random_shapes
  n_cubes: 36
  n_spheres: 36
  min_size: 4
  max_size: 20
  min_value: 0.05
  max_value: 1.0
  noise: poisson
  noise_level: 4000
  seed: 69
  misalignment:
    rot_deg: 1.25
    trans_px: 8.0
    include_phi: true
    seed: 69
