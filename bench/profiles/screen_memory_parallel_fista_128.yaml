name: screen_memory_parallel_fista_128
task: recon
objective_name: peak_gpu_memory_mb
objective_direction: minimise
warm_runs: 1
jax_cache_dir: null
env:
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
measurement:
  gpu_memory: true
  host_rss: true
  gpu_poll_interval_seconds: 0.02
  host_poll_interval_seconds: 0.05
recon:
  algorithm: fista_tv
  iters: 8
  lambda_tv: 0.003
  tv_prox_iters: 8
  recon_rel_tol: null
  recon_patience: 0
  views_per_batch: 1
  projector_unroll: 1
  checkpoint_projector: true
  gather_dtype: bf16
  grad_mode: auto
data:
  nx: 128
  ny: 128
  nz: 128
  nu: 128
  nv: 128
  n_views: 160
  geometry: parallel
  phantom: random_shapes
  n_cubes: 24
  n_spheres: 24
  min_size: 4
  max_size: 24
  min_value: 0.03
  max_value: 0.9
  seed: 23
