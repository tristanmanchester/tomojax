name: check_convergence_align_parallel_3d_256_fun
task: align
objective_name: warm_seconds_to_quality_threshold
objective_direction: minimise
warm_runs: 1
jax_cache_dir: null
env:
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
measurement:
  gpu_memory: true
  host_rss: true
  gpu_poll_interval_seconds: 0.05
  host_poll_interval_seconds: 0.05
visualization:
  enabled: true
convergence:
  enabled: true
  metric: gt_mse
  threshold: 250.0
  stop_on_threshold: true
  min_finest_level_checks: 2
  plateau_patience: 2
  rel_improvement_tol: 0.05
  required_warm_successes: 1
align:
  levels: [8, 4, 2, 1]
  outer_iters: 1
  recon_iters: 4
  lambda_tv: 0.003
  tv_prox_iters: 8
  recon_rel_tol: null
  recon_patience: 0
  views_per_batch: 1
  projector_unroll: 1
  checkpoint_projector: true
  gather_dtype: bf16
  opt_method: gn
  gn_damping: 0.001
  w_rot: 0.001
  w_trans: 0.001
  early_stop: false
  loss_kind: l2_otsu
  k_step: 1
data:
  nx: 256
  ny: 256
  nz: 256
  nu: 256
  nv: 256
  n_views: 192
  geometry: parallel
  phantom: random_shapes
  n_cubes: 36
  n_spheres: 36
  min_size: 8
  max_size: 36
  min_value: 0.05
  max_value: 1.0
  noise: poisson
  noise_level: 4000
  seed: 401
  misalignment:
    rot_deg: 1.25
    trans_px: 10.0
    include_phi: true
    seed: 402
