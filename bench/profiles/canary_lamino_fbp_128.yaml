name: canary_lamino_fbp_128
task: recon
objective_name: warm_run_seconds_mean
objective_direction: minimise
warm_runs: 1
jax_cache_dir: null
env:
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
measurement:
  gpu_memory: true
  host_rss: true
  gpu_poll_interval_seconds: 0.05
  host_poll_interval_seconds: 0.05
recon:
  algorithm: fbp
  filter_name: ramp
  views_per_batch: 1
  projector_unroll: 1
  checkpoint_projector: true
  gather_dtype: bf16
data:
  nx: 128
  ny: 128
  nz: 128
  nu: 128
  nv: 128
  n_views: 320
  geometry: lamino
  tilt_deg: 35
  tilt_about: x
  phantom: lamino_disk
  lamino_thickness_ratio: 0.15
  seed: 51
