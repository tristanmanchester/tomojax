name: screen_convergence_align_parallel_3d_64
task: align
objective_name: warm_seconds_to_quality_threshold
objective_direction: minimise
warm_runs: 1
jax_cache_dir: null
env:
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
measurement:
  gpu_memory: true
  host_rss: true
  gpu_poll_interval_seconds: 0.05
  host_poll_interval_seconds: 0.05
visualization:
  enabled: true
convergence:
  enabled: true
  metric: gt_mse
  threshold: 0.8
  stop_on_threshold: true
  min_finest_level_checks: 2
  plateau_patience: 2
  rel_improvement_tol: 0.02
  required_warm_successes: 1
align:
  levels: [2, 1]
  outer_iters: 2
  recon_iters: 4
  lambda_tv: 0.003
  tv_prox_iters: 8
  recon_rel_tol: null
  recon_patience: 0
  views_per_batch: 1
  projector_unroll: 1
  checkpoint_projector: true
  gather_dtype: bf16
  opt_method: gn
  gn_damping: 0.001
  w_rot: 0.001
  w_trans: 0.001
  early_stop: false
  loss_kind: l2_otsu
  k_step: 1
data:
  nx: 64
  ny: 64
  nz: 64
  nu: 64
  nv: 64
  n_views: 90
  geometry: parallel
  phantom: random_shapes
  n_cubes: 12
  n_spheres: 12
  min_size: 4
  max_size: 14
  min_value: 0.05
  max_value: 1.0
  noise: poisson
  noise_level: 5000
  seed: 101
  misalignment:
    rot_deg: 1.0
    trans_px: 6.0
    include_phi: true
    seed: 102
