# Minimal tomojax-align config.
# Run with:
#   uv run tomojax-align --config docs/align_config.toml

data = "data/sim_misaligned.nxs"
out = "runs/align_from_config.nxs"

outer_iters = 4
recon_iters = 25
recon_algo = "fista"
# Use SPDHG-TV as the inner reconstruction solver for larger view counts.
# recon_algo = "spdhg"
# views_per_batch = 8
# spdhg_seed = 0
# recon_positivity = true
lambda_tv = 0.003
regulariser = "tv"
# regulariser = "huber_tv"
# huber_delta = 0.01
levels = [4, 2, 1]
opt_method = "gn"
gn_damping = 0.001
# L-BFGS-only tuning. `lbfgs_memory_size` is the number of previous
# gradient/step pairs retained by Optax's limited-memory approximation.
# lbfgs_maxiter = 20
# lbfgs_ftol = 0.000001
# lbfgs_gtol = 0.00001
# lbfgs_maxls = 20
# lbfgs_memory_size = 10
# Optional pyramid-level loss schedule. Numeric keys are pyramid factors from
# levels, and omitted levels fall back to loss (default: l2_otsu).
# loss = "l2"
#
# Recommended first pass for translation-only coarse-to-fine alignment:
# optimise_dofs = ["dx", "dz"]
# loss_schedule = "4:phasecorr,2:ssim,1:l2_otsu"
#
# For full 5-DOF alignment, prefer a conservative single loss first:
# loss = "ssim"
#
# Equivalent TOML mapping form:
# loss_schedule = { "4" = "phasecorr", "2" = "ssim", "1" = "l2_otsu" }
# Common DOF selections:
#   2-DOF translation-only alignment: optimise_dofs = ["dx", "dz"]
#   4-DOF with in-plane spin fixed: freeze_dofs = ["phi"]
#   5-DOF full alignment: omit both keys, or set all names explicitly.
# optimise_dofs = ["dx", "dz"]
# freeze_dofs = ["phi"]
# Optional finite parameter bounds by DOF. Rotations are radians; translations
# are world units. Omitted DOFs are unconstrained.
# bounds = { dx = [-20, 20], dz = [-20, 20], alpha = [-0.05, 0.05] }
# Optional smooth motion model for drift-like or mechanically smooth alignment.
# The default per_view model optimises one independent 5-DOF vector per view.
# Use spline or polynomial on noisy data when per-view fitting overfits view-local noise.
# pose_model = "spline"
# knot_spacing = 12
# degree = 3
# Gauge fixing removes ambiguous global translation from saved per-view traces.
# The default mean_translation subtracts the scan-wide mean from active dx,dz.
# Set to "none" to reproduce historical unconstrained alignment traces.
gauge_fix = "mean_translation"
gather_dtype = "auto"
checkpoint_projector = true
# Resumable alignment checkpoints are written after completed outer iterations.
# They do not checkpoint inside FISTA reconstruction inner iterations.
# checkpoint = "runs/align_from_config.checkpoint.npz"
# checkpoint_every = 1
# To resume, run the CLI with:
#   uv run tomojax-align --config docs/align_config.toml --resume runs/align_from_config.checkpoint.npz
log_summary = true
progress = true
save_params_json = "runs/align_from_config.params.json"
save_params_csv = "runs/align_from_config.params.csv"
save_manifest = "runs/align_from_config.manifest.json"
