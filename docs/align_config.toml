# Minimal tomojax-align config.
# Run with:
#   uv run tomojax-align --config docs/align_config.toml

data = "data/sim_misaligned.nxs"
out = "runs/align_from_config.nxs"

outer_iters = 4
recon_iters = 25
lambda_tv = 0.003
levels = [4, 2, 1]
opt_method = "gn"
gn_damping = 0.001
# Common DOF selections:
#   2-DOF translation-only alignment: optimise_dofs = ["dx", "dz"]
#   4-DOF with in-plane spin fixed: freeze_dofs = ["phi"]
#   5-DOF full alignment: omit both keys, or set all names explicitly.
# optimise_dofs = ["dx", "dz"]
# freeze_dofs = ["phi"]
# Optional finite parameter bounds by DOF. Rotations are radians; translations
# are world units. Omitted DOFs are unconstrained.
# bounds = { dx = [-20, 20], dz = [-20, 20], alpha = [-0.05, 0.05] }
gather_dtype = "auto"
checkpoint_projector = true
log_summary = true
progress = true
save_params_json = "runs/align_from_config.params.json"
save_params_csv = "runs/align_from_config.params.csv"
save_manifest = "runs/align_from_config.manifest.json"
