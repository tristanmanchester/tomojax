# Minimal tomojax-recon config.
# Run with:
#   uv run tomojax-recon --config docs/recon_config.toml

data = "data/sim_misaligned.nxs"
out = "runs/recon_from_config.nxs"

algo = "fbp"
filter = "ramp"
# Iterative regulariser options:
regulariser = "tv"
# regulariser = "huber_tv"
# huber_delta = 0.01
# FISTA-only optional physical constraints:
# positivity = true
# lower_bound = 0.0
# upper_bound = 1.0
roi = "auto"
gather_dtype = "auto"
checkpoint_projector = true
progress = true
save_manifest = "runs/recon_from_config.manifest.json"
