synthetic128_suite:
  common:
    volume_shape: [128, 128, 128]
    dtype: float32
    default_detector_shape: [160, 160]
    default_views: 256
    default_theta_range_deg: [0, 180]
    default_theta_endpoint: false
    phantom_components:
      - ellipsoids
      - rods_fibres
      - beads
      - sheets
      - voids
      - asymmetric_marker_cluster
      - smooth_texture
    benchmark_impls:
      - current_no_align
      - current_setup_only
      - current_full_alignment
      - reimagined_jax_reference
      - reimagined_auto
      - reimagined_max_optional

  datasets:
    synth128_setup_global_tomo:
      purpose: global setup errors without grid search
      mode: parallel_tomography
      phantom_seed: 1001
      detector_shape: [160, 160]
      views: 256
      theta_range_deg: [0, 180]
      true_setup:
        det_u_px: 14.5
        det_v_px: 0.0
        detector_roll_deg: 0.65
        axis_rot_x_deg: 0.45
        axis_rot_y_deg: -0.30
        theta_offset_deg: 1.25
        theta_scale: 1.0
      true_pose:
        alpha_deg: zero
        beta_deg: zero
        phi_residual_deg: zero
        dx_px: zero
        dz_px: zero
      nuisance:
        noise: standard
        hot_pixels_fraction: 0.0005
      pass_criteria:
        det_u_error_px_lt: 0.5
        roll_error_deg_lt: 0.05
        axis_error_deg_lt: 0.1
        theta_offset_error_deg_lt: 0.1

    rich_phantom94_setup_global_tomo:
      purpose: PHANTOM94 rich old-style phantom with global setup errors
      mode: parallel_tomography
      phantom_kind: phantom94_random_cubes_spheres
      phantom_seed: 20260893
      detector_shape: [160, 160]
      views: 256
      theta_range_deg: [0, 180]
      true_setup:
        det_u_px: 14.5
        det_v_px: 0.0
        detector_roll_deg: 0.65
        axis_rot_x_deg: 0.45
        axis_rot_y_deg: -0.30
        theta_offset_deg: 1.25
        theta_scale: 1.0
      true_pose:
        alpha_deg: zero
        beta_deg: zero
        phi_residual_deg: zero
        dx_px: zero
        dz_px: zero
      nuisance:
        noise: standard
        hot_pixels_fraction: 0.0005
      pass_criteria:
        det_u_error_px_lt: 0.5
        roll_error_deg_lt: 0.05
        axis_error_deg_lt: 0.1
        theta_offset_error_deg_lt: 0.1

    rich_phantom94_det_u_only_v1_parity:
      purpose: PHANTOM94 det_u-only v1-parity stopped alignment gate
      mode: parallel_tomography
      phantom_kind: phantom94_random_cubes_spheres
      phantom_seed: 20260893
      detector_shape: [160, 160]
      views: 256
      theta_range_deg: [0, 180]
      true_setup:
        det_u_px: 14.5
        det_v_px: 0.0
        detector_roll_deg: 0.0
        axis_rot_x_deg: 0.0
        axis_rot_y_deg: 0.0
        theta_offset_deg: 0.0
        theta_scale: 1.0
      true_pose:
        alpha_deg: zero
        beta_deg: zero
        phi_residual_deg: zero
        dx_px: zero
        dz_px: zero
      nuisance:
        noise: standard
      pass_criteria:
        det_u_error_px_lt: 0.5

    synth128_pose_random_extreme:
      purpose: all-5 per-view pose stress test
      mode: parallel_tomography
      phantom_seed: 1002
      pose_seed: 2002
      detector_shape: [160, 160]
      views: 256
      theta_range_deg: [0, 180]
      true_setup:
        det_u_px: 0.0
        det_v_px: 0.0
        detector_roll_deg: 0.0
        axis_rot_x_deg: 0.0
        axis_rot_y_deg: 0.0
        theta_offset_deg: 0.0
        theta_scale: 1.0
      true_pose:
        dx_px: uniform_-20_20
        dz_px: uniform_-20_20
        phi_residual_deg: uniform_-10_10
        alpha_deg: uniform_-2_2
        beta_deg: uniform_-2_2
      nuisance:
        noise: hard
        gaussian_sigma_fraction_of_projection_scale: 0.05
        hot_pixels_fraction: 0.001
      pass_criteria:
        dx_dz_rmse_px_lt: 1.0
        phi_rmse_deg_lt: 0.25
        alpha_beta_rmse_deg_lt: 0.25

    synth128_lamino_axis_roll_pose:
      purpose: laminography setup, axis direction, roll, calibrated-grid fallback
      mode: parallel_laminography
      phantom_seed: 1003
      pose_seed: 2003
      detector_shape: [192, 192]
      views: 256
      theta_range_deg: [0, 360]
      laminography_tilt_deg: 60
      detector_grid: calibrated_noncanonical
      true_setup:
        det_u_px: -8.0
        det_v_px: 3.0
        detector_roll_deg: 1.10
        axis_rot_x_deg: 0.70
        axis_rot_y_deg: -0.55
        theta_offset_deg: -0.80
        theta_scale: 1.0
      true_pose:
        dx_px: 3.0*sin(2theta+0.4)+normal_0_0.5
        dz_px: 2.0*cos(3theta-0.2)+normal_0_0.5
        alpha_deg: 0.35*sin(theta+0.7)+normal_0_0.05
        beta_deg: 0.30*cos(theta-0.5)+normal_0_0.05
        phi_residual_deg: 0.15*sin(4theta)+normal_0_0.03
      nuisance:
        noise: standard
        partial_fov: mild
        gain_drift_fraction: 0.01
      pass_criteria:
        axis_error_deg_lt: 0.15
        detector_roll_error_deg_lt: 0.10
        det_u_error_px_lt: 1.0
        det_v_policy: recovered_or_reported_unobservable
        backend_policy: calibrated_grid_fallback_explicit

    synth128_thermal_object_drift:
      purpose: object-frame thermal/glue drift vs detector-frame pose
      mode: parallel_tomography
      phantom_seed: 1004
      pose_seed: 2004
      detector_shape: [160, 160]
      views: 256
      theta_range_deg: [0, 180]
      true_setup:
        det_u_px: 6.0
        det_v_px: 0.0
        detector_roll_deg: 0.20
        axis_rot_x_deg: 0.0
        axis_rot_y_deg: 0.0
        theta_offset_deg: 0.35
        theta_scale: 1.0008
      true_object_motion:
        tx_obj_px: -12.0*smoothstep(t)
        ty_obj_px: 2.0*sin(2*pi*t)
        tz_obj_px: 1.5*t
        rot_obj_z_deg: 0.20*smoothstep(t)
      true_pose:
        dx_px: normal_0_0.4
        dz_px: normal_0_0.4
        alpha_deg: normal_0_0.03
        beta_deg: normal_0_0.03
        phi_residual_deg: normal_0_0.02
      nuisance:
        noise: standard
        gain_drift: linear_0.98_to_1.03
        background_offset: small_linear
      pass_criteria:
        core_solver: flags_object_motion_suspected
        object_motion_enabled_tx_rmse_px_lt: 1.5

    synth128_combined_nuisance_jumps:
      purpose: hard combined real-world failure modes
      mode: parallel_laminography
      phantom_seed: 1005
      pose_seed: 2005
      detector_shape: [192, 192]
      views: 320
      theta_range_deg: [0, 360]
      laminography_tilt_deg: 55
      true_setup:
        det_u_px: -14.5
        det_v_px: 4.0
        detector_roll_deg: -0.85
        axis_rot_x_deg: 0.95
        axis_rot_y_deg: 0.40
        theta_offset_deg: 1.50
        theta_scale: 0.9985
      true_pose:
        dx_px: -6.0*t + 2.5*sin(2theta+0.3) + sparse_jumps + normal_0_0.8
        dz_px: 3.0*smoothstep(t) + 1.5*cos(3theta) + sparse_jumps + normal_0_0.8
        alpha_deg: 0.45*sin(theta) + 0.15*sin(5theta) + sparse_jumps + normal_0_0.05
        beta_deg: 0.40*cos(theta+0.2) + sparse_jumps + normal_0_0.05
        phi_residual_deg: 0.25*sin(2theta-0.8) + sparse_jumps + normal_0_0.05
      nuisance:
        gaussian_noise_fraction: 0.03
        hot_pixels_fraction: 0.001
        dead_pixels_fraction: 0.0005
        stripe_bias_columns: 4
        gain_drift: 0.97_to_1.04_plus_sinusoid
        background_drift: low_frequency_vertical_gradient
        partial_fov_invalid_edge_fraction: 0.05
        bad_views: 3
      pass_criteria:
        beats_current_default_nmse: true
        det_u_error_px_lt: 1.5
        axis_roll_error_deg_lt: 0.2
        theta_offset_error_deg_lt: 0.2
        pose_dx_dz_rmse_px_lt_except_jumps: 2.0
        bad_views_flagged: true
